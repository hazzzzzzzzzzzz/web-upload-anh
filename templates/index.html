<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload và Xem Ảnh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background-color: #f9f9f9;
        }

        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

            button:hover {
                background-color: #0056b3;
            }

        .flash-message {
            color: #d9534f;
            font-weight: bold;
            margin-bottom: 15px;
        }
        /* Style cho danh sách ảnh */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .gallery-item {
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
            background: #fff;
        }

            .gallery-item img {
                width: 100%;
                height: 150px;
                object-fit: cover; /* Giúp ảnh không bị méo */
                display: block;
            }

        .gallery-title {
            text-align: left;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="upload-box">
        <h2>ỨNG DỤNG UPLOAD ẢNH</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash-message">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*"><br>
            <button type="submit">Tải ảnh lên</button>
        </form>
    </div>

    {% if images %}
    <h3 class="gallery-title">Các ảnh đã upload:</h3>
    <div class="gallery">
        {% for image in images %}
        <div class="gallery-item">
            <img src="{{ url_for('uploaded_file', filename=image) }}" alt="Ảnh">
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p style="color: #888;">Chưa có ảnh nào được upload.</p>
    {% endif %}

</body>
</html>
