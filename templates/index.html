{% if images %}
<h3 class="gallery-title">Các ảnh đã lưu vĩnh viễn:</h3>
<div class="gallery">
    {% for image_url in images %}
    <div class="gallery-item">
        <img src="{{ image_url }}" alt="Ảnh">
    </div>
    {% endfor %}
</div>
    {% else %}
<p style="color: #888;">Chưa có ảnh nào được upload.</p>
    {% endif %}

</body>
</html>
