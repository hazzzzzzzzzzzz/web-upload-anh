<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload và Lưu Trữ Ảnh Vĩnh Viễn</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background-color: #f4f6f9;
            color: #333;
        }

        .upload-box {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            border: 2px dashed #3498db;
            border-radius: 8px;
            background-color: #fafffa;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

            button:hover {
                background-color: #27ae60;
                transform: translateY(-2px);
                box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
            }

        .flash-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            border: 1px solid #f5c6cb;
            display: inline-block;
            width: 80%;
        }
        /* Style cho danh sách ảnh */
        .gallery-title {
            text-align: left;
            margin-top: 30px;
            color: #2c3e50;
            border-left: 5px solid #3498db;
            padding-left: 10px;
            font-size: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .gallery-item {
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

            .gallery-item:hover {
                transform: scale(1.03);
            }

            .gallery-item img {
                width: 100%;
                height: 180px;
                object-fit: cover; /* Giúp ảnh không bị bóp méo hình dạng */
                display: block;
            }

        .no-image {
            color: #7f8c8d;
            font-style: italic;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="upload-box">
        <h2>Hệ Thống Lưu Trữ Ảnh Vĩnh Viễn</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash-message">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required><br>
            <button type="submit">Tải ảnh lên đám mây</button>
        </form>
    </div>

    {% if images %}
    <h3 class="gallery-title">Các bức ảnh đã lưu trữ vĩnh viễn:</h3>
    <div class="gallery">
        {% for image_url in images %}
        <div class="gallery-item">
